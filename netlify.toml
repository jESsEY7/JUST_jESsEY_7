[build]
  command = "pip install 'setuptools>=65.0.0,<67.0.0' && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py build"
  publish = "build"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/favicon.ico"
  to = "/static/images/favicon.png"
  status = 200
